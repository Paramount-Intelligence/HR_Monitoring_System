<style>
        .input-glow:focus-within {
            box-shadow: 0 0 0 2px rgba(33, 81, 218, 0.2);

        }

<body class="bg-background-alt text-on-surface font-body-md min-h-screen flex items-center justify-center p-4 antialiased">
<!-- Login Container -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-outline-variant/30 p-8 flex flex-col gap-8">
<!-- Header -->
<header class="flex flex-col items-center text-center gap-4">
<img alt="PIMS Logo" class="w-16 h-16 object-contain" src="https://lh3.googleusercontent.com/aida/AP1WRLu58gLKO-P_LkNUayj-_J4BmYiEajVkjG0N8zAJhj7oE-Jvm2THvRyQfqQNf-gFJa5d3jwtn0AuxnDK4pg5fVtf9l37-8k5ZfYMMVeRyeqYkd_VWZRJE6uSu0W4WxN-NnfOB_5F-dLYaBK_ZKoRq1jzDMG3HnIb0lPLseBWSSE3nZLcR9LK2Ei8wR3foz_Ky8K7vPTWBW5Dn-bRS6KHUk1vN-m4CAbCn_gwCVQJSJ90vt9Z9tZfiTsWKQ"/>
<div>
<h1 class="text-headline-lg-mobile font-headline-lg-mobile text-on-surface mb-1">Welcome to PIMS</h1>
<p class="text-label-sm font-label-sm text-surface-tint uppercase tracking-wider mb-2">Paramount Intelligence Monitoring System</p>
<p class="text-body-md font-body-md text-on-surface-variant max-w-xs mx-auto">Secure access to your workforce monitoring and operations platform.</p>
</div>
</header>
<!-- Login Form -->
<form class="flex flex-col gap-6" onsubmit="event.preventDefault(); handleLogin();">
<!-- Email Input -->
<div class="flex flex-col gap-2">
<label class="text-label-sm font-label-sm text-on-surface" for="email">Email</label>
<div class="relative flex items-center bg-surface border border-outline-variant rounded-lg input-glow transition-all duration-200 h-[44px]">
<span class="material-symbols-outlined text-outline absolute left-3 text-[20px]" data-icon="mail">mail</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-body-md font-body-md text-on-surface pl-10 pr-4 py-2" id="email" placeholder="name@company.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-2">
<label class="text-label-sm font-label-sm text-on-surface" for="password">Password</label>
<div class="relative flex items-center bg-surface border border-outline-variant rounded-lg input-glow transition-all duration-200 h-[44px]">
<span class="material-symbols-outlined text-outline absolute left-3 text-[20px]" data-icon="lock">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 text-body-md font-body-md text-on-surface pl-10 pr-10 py-2" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-3 text-outline hover:text-on-surface transition-colors focus:outline-none" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility" id="visibility-icon">visibility</span>
</button>
</div>
<!-- Error State Placeholder (Hidden by default) -->
<div class="hidden text-caption font-caption text-error flex items-center gap-1 mt-1" id="error-message">
<span class="material-symbols-outlined text-[14px]" data-icon="error">error</span>
                    Incorrect email or password.
                </div>
</div>
<!-- Actions (Remember Me & Forgot Password) -->
<div class="flex justify-between items-center mt-[-8px]">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="rounded border-outline-variant text-surface-tint focus:ring-surface-tint w-4 h-4 transition-colors" type="checkbox"/>
<span class="text-caption font-caption text-on-surface-variant group-hover:text-on-surface transition-colors">Keep me logged in</span>
</label>
<a class="text-caption font-caption text-surface-tint hover:text-primary transition-colors font-semibold" href="#">Forgot password?</a>
</div>
<!-- Submit Button -->
<button class="w-full h-[44px] bg-primary text-on-primary rounded-lg text-body-md font-body-md font-semibold hover:bg-surface-tint transition-colors focus:outline-none focus:ring-2 focus:ring-surface-tint focus:ring-offset-2 flex items-center justify-center gap-2 mt-2" id="login-btn" type="submit">
<span id="btn-text">Sign In</span>
<!-- Loading Spinner (Hidden by default) -->
<span class="hidden material-symbols-outlined animate-spin text-[20px]" data-icon="progress_activity" id="btn-spinner">progress_activity</span>
</button>
</form>
<!-- Footer -->
<footer class="mt-4 pt-6 border-t border-outline-variant/30 text-center">
<p class="text-caption font-caption text-outline uppercase tracking-wider">© Paramount Intelligence</p>
</footer>
</main>
<script>
        function togglePassword() {
            const pwdInput = document.getElementById('password');
            const icon = document.getElementById('visibility-icon');
            if (pwdInput.type === 'password') {
                pwdInput.type = 'text';
                icon.textContent = 'visibility_off';
                icon.setAttribute('data-icon', 'visibility_off');
            } else {
                pwdInput.type = 'password';
                icon.textContent = 'visibility';
                icon.setAttribute('data-icon', 'visibility');
            }
        }

        function handleLogin() {
            const btn = document.getElementById('login-btn');
            const btnText = document.getElementById('btn-text');
            const btnSpinner = document.getElementById('btn-spinner');
            const errorMsg = document.getElementById('error-message');
            const pwdInput = document.getElementById('password').parentElement;

            // Reset error state
            errorMsg.classList.add('hidden');
            pwdInput.classList.remove('border-error');

            // Simulate Loading State
            btn.disabled = true;
            btn.classList.add('opacity-90', 'cursor-not-allowed');
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');

            setTimeout(() => {
                // Simulate Error State for demonstration
                btn.disabled = false;
                btn.classList.remove('opacity-90', 'cursor-not-allowed');
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                
                errorMsg.classList.remove('hidden');
                pwdInput.classList.add('border-error');
            }, 1500);
        }
    </script>
</body></html>
