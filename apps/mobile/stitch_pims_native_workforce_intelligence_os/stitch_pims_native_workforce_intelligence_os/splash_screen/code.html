<style>
        .loader-ring {
            width: 48px;
            height: 48px;
            border: 3px solid rgba(33, 81, 218, 0.1);
            border-radius: 50%;
            border-top-color: #2151da;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        .delay-1 { animation-delay: 0.2s; }
        .delay-2 { animation-delay: 0.4s; }
        .delay-3 { animation-delay: 0.6s; }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bg-pattern {
            background-image: radial-gradient(circle at 50% 50%, rgba(33, 81, 218, 0.03) 0%, transparent 100%),
                              linear-gradient(to bottom, transparent, rgba(249, 249, 255, 1) 100%);
            background-size: 100% 100%;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex flex-col items-center justify-center relative overflow-hidden font-body-md antialiased text-on-surface">
<!-- Subtle Background Elements -->
<div class="absolute inset-0 bg-pattern pointer-events-none z-0"></div>
<div class="absolute top-0 right-0 w-96 h-96 bg-primary-container opacity-[0.02] rounded-full blur-3xl transform translate-x-1/3 -translate-y-1/3 pointer-events-none z-0"></div>
<div class="absolute bottom-0 left-0 w-96 h-96 bg-secondary-container opacity-[0.03] rounded-full blur-3xl transform -translate-x-1/3 translate-y-1/3 pointer-events-none z-0"></div>
<!-- Main Content Canvas -->
<main class="relative z-10 flex flex-col items-center justify-center w-full max-w-md px-grid-margin py-stack-lg text-center">
<!-- Logo Section -->
<div class="mb-stack-lg fade-in-up delay-1">
<div class="w-24 h-24 md:w-32 md:h-32 rounded-2xl bg-surface-container-lowest shadow-[0_4px_24px_rgba(0,0,0,0.04)] flex items-center justify-center p-4 mx-auto border border-surface-variant/50 relative overflow-hidden group">
<div class="absolute inset-0 bg-gradient-to-tr from-primary/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity duration-500"></div>
<img alt="PIMS Logo" class="w-full h-full object-contain relative z-10" src="https://lh3.googleusercontent.com/aida/AP1WRLu58gLKO-P_LkNUayj-_J4BmYiEajVkjG0N8zAJhj7oE-Jvm2THvRyQfqQNf-gFJa5d3jwtn0AuxnDK4pg5fVtf9l37-8k5ZfYMMVeRyeqYkd_VWZRJE6uSu0W4WxN-NnfOB_5F-dLYaBK_ZKoRq1jzDMG3HnIb0lPLseBWSSE3nZLcR9LK2Ei8wR3foz_Ky8K7vPTWBW5Dn-bRS6KHUk1vN-m4CAbCn_gwCVQJSJ90vt9Z9tZfiTsWKQ"/>
</div>
</div>
<!-- Typography Section -->
<div class="space-y-stack-sm mb-stack-lg w-full fade-in-up delay-2">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-on-surface tracking-tight">
                PIMS
            </h1>
<p class="font-label-sm text-label-sm text-primary uppercase tracking-[0.1em] mb-base">
                Paramount Intelligence Monitoring System
            </p>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">
                Workforce Intelligence &amp; Execution OS
            </p>
</div>
<!-- Loading Indicator -->
<div class="mt-stack-lg flex flex-col items-center justify-center fade-in-up delay-3">
<div class="loader-ring mb-stack-md"></div>
<p class="font-caption text-caption text-secondary/80 animate-pulse">
                Initializing System...
            </p>
</div>
</main>
<!-- Footer Security Badge -->
<footer class="absolute bottom-safe left-0 w-full pb-stack-md px-grid-margin text-center z-10 fade-in-up delay-3">
<p class="font-caption text-caption text-secondary/60 flex items-center justify-center gap-1.5">
<span class="material-symbols-outlined text-[14px]">lock</span>
            Secure Enterprise Connection
        </p>
</footer>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
